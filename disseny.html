<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ibai Jaimez — Obres de Disseny</title>
<style>
  @font-face {
    font-family: 'Playfair Display';
    src: local('Georgia'), local('Times New Roman');
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --black: #2a2520;
    --off-white: #f0ebe3;
    --beige: #c8b89a;
    --gray: #aaa;
    --light-gray: #3a3530;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--off-white);
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top:0; left:0; right:0; z-index:100;
    display:flex; justify-content:space-between; align-items:center;
    padding: 1.5rem 3rem;
  }
  nav::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(to bottom, rgba(10,10,10,0.95), transparent);
    pointer-events:none;
  }
  .nav-logo {
    font-family:'Playfair Display', serif;
    font-size: 1.1rem; letter-spacing:.15em;
    text-transform:uppercase; color: var(--off-white);
    text-decoration:none; position:relative; z-index:1;
  }
  .nav-links { display:flex; gap:2.5rem; position:relative; z-index:1; }
  .nav-links a {
    color: var(--beige); text-decoration:none;
    font-size:.75rem; letter-spacing:.2em; text-transform:uppercase;
    transition: color .3s;
  }
  .nav-links a:hover { color: var(--off-white); }

  /* DROPDOWN */
  .nav-dropdown { position:relative; }
  .nav-dropdown-trigger { cursor:pointer; display:flex; align-items:center; gap:.4rem; }
  .nav-dropdown-trigger::after {
    content:''; width:5px; height:5px;
    border-right:1px solid var(--beige); border-bottom:1px solid var(--beige);
    transform:rotate(45deg) translateY(-2px);
    transition: transform .25s;
  }
  .nav-dropdown.open .nav-dropdown-trigger::after {
    transform:rotate(-135deg) translateY(-2px);
  }
  .nav-dropdown-menu {
    position:absolute; top:calc(100% + 1rem); left:50%;
    background:rgba(30,27,24,0.97);
    border:1px solid var(--light-gray);
    padding:.6rem 0;
    display:flex; flex-direction:column;
    min-width:130px;
    opacity:0; pointer-events:none;
    transform:translateX(-50%) translateY(-6px);
    transition:opacity .2s, transform .2s;
  }
  .nav-dropdown.open .nav-dropdown-menu {
    opacity:1; pointer-events:auto;
    transform:translateX(-50%) translateY(0);
  }
  .nav-dropdown-menu a {
    padding:.5rem 1.2rem;
    font-size:.7rem; letter-spacing:.2em; text-transform:uppercase;
    color:var(--beige); text-decoration:none;
    transition:color .2s, background .2s;
    white-space:nowrap;
  }
  .nav-dropdown-menu a:hover { color:var(--off-white); background:rgba(255,255,255,0.04); }

  /* HERO */
  #hero-design {
    height: 100vh; min-height: 600px;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 5rem 3rem;
    position: relative; overflow: hidden;
    background: var(--black);
    border-bottom: 1px solid var(--light-gray);
  }

  /* Particles */
  #hero-particles { position:absolute; inset:0; pointer-events:none; z-index:1; }

  /* Orbit positioning wrapper — no transform so GSAP can freely animate x/y */
  #orbit-pos {
    position: absolute;
    right: 8%;
    top: calc(50% - 180px);
    z-index: 2; pointer-events: none;
  }
  /* Orbit rotation container — GSAP spins this */
  #orbit { width: 360px; height: 360px; position: relative; }

  /* Each shape centered in #orbit, then offset to triangle positions */
  .orbit-item { position: absolute; top: 50%; left: 50%; }
  .orbit-top { transform: translate(-50%, -50%) translateY(-130px); }
  .orbit-bl  { transform: translate(-50%, -50%) translate(-113px, 65px); }
  .orbit-br  { transform: translate(-50%, -50%) translate(113px, 65px); }

  /* Cube */
  .orbit-cube { width: 80px; height: 80px; perspective: 400px; }
  .cube { width: 80px; height: 80px; position: relative; transform-style: preserve-3d; }
  .face {
    position: absolute; width: 80px; height: 80px;
    border: 1px solid rgba(200,184,154,0.45);
    background: rgba(42,37,32,0.1);
  }
  .face.front  { transform: translateZ(40px); }
  .face.back   { transform: rotateY(180deg) translateZ(40px); }
  .face.left   { transform: rotateY(-90deg) translateZ(40px); }
  .face.right  { transform: rotateY(90deg)  translateZ(40px); }
  .face.top    { transform: rotateX(90deg)  translateZ(40px); }
  .face.bottom { transform: rotateX(-90deg) translateZ(40px); }

  /* Circle */
  .shape-circle {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 1px solid rgba(200,184,154,0.45);
    background: rgba(42,37,32,0.1);
  }

  /* Triangle */
  .shape-triangle { width: 90px; height: 78px; display: block; }

  .hero-design-content { position: relative; z-index: 3; }

  .page-eyebrow {
    font-size:.7rem; letter-spacing:.4em; text-transform:uppercase;
    color: var(--beige); margin-bottom:1.5rem;
  }
  .page-title {
    font-family:'Playfair Display', serif;
    font-size: clamp(3.5rem, 8vw, 8rem);
    font-weight:900; line-height:.95;
    color: var(--off-white);
  }
  .page-title em { font-style:italic; color: var(--beige); }

  .hero-scroll {
    position: absolute; bottom: 2.5rem; right: 3rem; z-index: 3;
    display: flex; flex-direction: column; align-items: center; gap: .5rem;
    color: var(--gray); font-size: .65rem; letter-spacing: .3em; text-transform: uppercase;
  }
  .hero-scroll::after {
    content: ''; width: 1px; height: 50px; background: var(--beige);
    animation: scrollLine 2s ease-in-out infinite;
  }
  @keyframes scrollLine {
    0%,100% { transform: scaleY(1); opacity: 1; }
    50%     { transform: scaleY(.5); opacity: .4; }
  }

  /* SECTION BASE */
  section { padding: 7rem 3rem; }

  /* WORK */
  #work { background: var(--black); }
  .work-grid {
    display:grid; grid-template-columns: repeat(2, 1fr);
    gap: 40px; max-width: 880px; margin: 0 auto;
  }
  .work-item {
    position:relative; overflow:hidden; cursor:pointer;
    aspect-ratio: 1/1;
    background: var(--light-gray);
  }
  .work-item::after {
    content:'';
    position:absolute; inset:0;
    pointer-events:none;
    z-index:3;
    box-shadow:
      inset 0 0 0 3px rgba(255,255,255,0.6),
      inset 0 0 0 18px rgba(200,200,200,0.97),
      inset 0 0 0 22px rgba(240,240,240,0.85);
  }
  .work-item img {
    width:100%; height:100%; object-fit:cover;
    transition: transform .8s cubic-bezier(.25,.46,.45,.94), filter .8s;
    filter: grayscale(20%);
  }
  .work-item:hover img {
    transform: scale(1.05); filter: grayscale(0%);
  }
  .work-overlay {
    position:absolute; inset:0; z-index:2;
    background: linear-gradient(to top, rgba(10,10,10,.85) 0%, transparent 50%);
    opacity:0; transition: opacity .4s;
    display:flex; align-items:flex-end; padding:2rem;
  }
  .work-item:hover .work-overlay { opacity:1; }
  .work-overlay.touch-visible { opacity:1; }
  .work-info h3 {
    font-family:'Playfair Display', serif;
    font-size:1.4rem; color: var(--off-white);
  }
  .work-info span {
    font-size:.7rem; letter-spacing:.2em; text-transform:uppercase;
    color: var(--beige);
  }
  .work-num {
    position:absolute; top:1.5rem; left:1.5rem; z-index:4;
    font-size:.65rem; letter-spacing:.2em; color: var(--gray);
  }

  /* CTA */
  #cta { text-align:center; padding:7rem 3rem; border-top:1px solid var(--light-gray); }
  .cta-label { font-size:.7rem; letter-spacing:.4em; text-transform:uppercase; color:var(--beige); margin-bottom:1.5rem; display:block; }
  .cta-title { font-family:'Playfair Display',serif; font-size:clamp(3rem,7vw,7rem); font-weight:900; color:var(--off-white); line-height:1; margin-bottom:2.5rem; }
  .cta-btn { display:inline-block; padding:.9rem 2.5rem; border:1px solid var(--beige); color:var(--beige); text-decoration:none; font-size:.75rem; letter-spacing:.3em; text-transform:uppercase; transition:background .3s,color .3s; }
  .cta-btn:hover { background:var(--beige); color:var(--black); }

  /* FOOTER */
  footer {
    border-top:1px solid var(--light-gray);
    padding:2rem 3rem;
    display:flex; justify-content:space-between; align-items:center;
    color: var(--gray); font-size:.65rem; letter-spacing:.2em;
  }

  /* SCROLL REVEAL */
  .reveal { opacity:0; transform:translateY(30px); transition: opacity .8s ease, transform .8s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }

  /* Odd last item — center it in the 2-col grid */
  @media (min-width: 769px) {
    .work-item:last-child:nth-child(odd) {
      grid-column: 1 / -1;
      max-width: calc(50% - 20px);
      margin: 0 auto;
    }
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 1.2rem 1.5rem; }
    .nav-links { gap: 1.2rem; }
    .nav-links a { font-size: .65rem; }
    #hero-design { padding: 4rem 1.5rem 7rem; height: 70vh; min-height: 450px; }
    #orbit-pos { right: auto; left: calc(50% - 120px); top: calc(32% - 120px); }
    #orbit { width: 240px; height: 240px; }
    .orbit-top { transform: translate(-50%, -50%) translateY(-88px); }
    .orbit-bl  { transform: translate(-50%, -50%) translate(-76px, 44px); }
    .orbit-br  { transform: translate(-50%, -50%) translate(76px, 44px); }
    .orbit-cube { width: 55px; height: 55px; }
    .cube  { width: 55px; height: 55px; }
    .face  { width: 55px; height: 55px; }
    .face.front  { transform: translateZ(28px); }
    .face.back   { transform: rotateY(180deg) translateZ(28px); }
    .face.left   { transform: rotateY(-90deg) translateZ(28px); }
    .face.right  { transform: rotateY(90deg)  translateZ(28px); }
    .face.top    { transform: rotateX(90deg)  translateZ(28px); }
    .face.bottom { transform: rotateX(-90deg) translateZ(28px); }
    .shape-circle   { width: 55px; height: 55px; }
    .shape-triangle { width: 62px; height: 54px; }
    section { padding: 4rem 1.5rem; }
    .work-grid { grid-template-columns: 1fr; }
    #cta { padding: 4rem 1.5rem; }
    footer { padding: 1.5rem; flex-direction: column; gap: .6rem; text-align: center; }
  }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  /* Shapes + orbit animation */
  const orbitEl  = document.getElementById('orbit');
  const orbitPos = document.getElementById('orbit-pos');
  const cube     = document.querySelector('.cube');
  const circle   = document.querySelector('.shape-circle');
  const triangle = document.querySelector('.shape-triangle');
  const heroEl   = document.getElementById('hero-design');

  gsap.to(orbitEl,  { rotation: 360, duration: 35, ease: 'none', repeat: -1 });
  gsap.to(cube,     { rotationY: 360, duration: 12, ease: 'none', repeat: -1 });
  gsap.to(cube,     { rotationX: 20,  duration: 5,  ease: 'sine.inOut', yoyo: true, repeat: -1 });
  gsap.to(circle,   { rotation: 360,  duration: 22, ease: 'none', repeat: -1 });
  gsap.to(triangle, { rotation: -360, duration: 18, ease: 'none', repeat: -1 });

  if (!window.matchMedia('(hover: none)').matches) {
    const moveX = gsap.quickTo(orbitPos, 'x', { duration: 1.1, ease: 'power2.out' });
    const moveY = gsap.quickTo(orbitPos, 'y', { duration: 1.1, ease: 'power2.out' });
    heroEl.addEventListener('mousemove', e => {
      const r  = heroEl.getBoundingClientRect();
      const dx = (e.clientX - r.left - r.width  / 2) / (r.width  / 2);
      const dy = (e.clientY - r.top  - r.height / 2) / (r.height / 2);
      moveX(dx * 30); moveY(dy * 18);
    });
    heroEl.addEventListener('mouseleave', () => { moveX(0); moveY(0); });
  }

  /* Particles */
  const pCanvas = document.getElementById('hero-particles');
  const pCtx    = pCanvas.getContext('2d');
  const parts   = [];

  function resizeCanvas() {
    pCanvas.width  = heroEl.offsetWidth;
    pCanvas.height = heroEl.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function spawnP() {
    parts.push({
      x:  Math.random() * pCanvas.width,
      y:  pCanvas.height + 4,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -(Math.random() * 0.28 + 0.08),
      a:  Math.random() * 0.18 + 0.04,
      r:  Math.random() * 1.3 + 0.3
    });
  }
  setInterval(() => { if (Math.random() < 0.45) spawnP(); }, 100);

  (function animP() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    for (let i = parts.length - 1; i >= 0; i--) {
      const p = parts[i];
      p.x += p.vx; p.y += p.vy;
      if (p.y < -10) { parts.splice(i, 1); continue; }
      pCtx.save();
      pCtx.globalAlpha = p.a;
      pCtx.fillStyle = '#c8b89a';
      pCtx.beginPath(); pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2); pCtx.fill();
      pCtx.restore();
    }
    requestAnimationFrame(animP);
  })();

  /* Scroll reveal */
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); } });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  /* Dropdown nav */
  const dropdown = document.querySelector('.nav-dropdown');
  const trigger = dropdown.querySelector('.nav-dropdown-trigger');
  trigger.addEventListener('click', e => {
    e.preventDefault();
    dropdown.classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!dropdown.contains(e.target)) dropdown.classList.remove('open');
  });
  dropdown.querySelectorAll('.nav-dropdown-menu a').forEach(a => {
    a.addEventListener('click', () => dropdown.classList.remove('open'));
  });

  /* Touch — auto-cycle on viewport entry */
  if (window.matchMedia('(hover: none)').matches) {
    const touchObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        const item = e.target;
        const overlay = item.querySelector('.work-overlay');
        if (e.isIntersecting) {
          if (overlay) overlay.classList.add('touch-visible');
          if (item._gallery) item._gallery.start();
        } else {
          if (overlay) overlay.classList.remove('touch-visible');
          if (item._gallery) item._gallery.stop();
        }
      });
    }, { threshold: 0.5 });
    document.querySelectorAll('.work-item').forEach(item => touchObs.observe(item));
  }

  /* Preload gallery images */
  document.querySelectorAll('.work-item[data-images]').forEach(item => {
    JSON.parse(item.getAttribute('data-images')).forEach(url => { new Image().src = url; });
  });

  /* Gallery cycling on hover */
  document.querySelectorAll('.work-item[data-images]').forEach(item => {
    const images = JSON.parse(item.getAttribute('data-images'));
    if (images.length < 2) return;
    const baseImg = item.querySelector('img');
    const nextImg = document.createElement('img');
    Object.assign(nextImg.style, {
      position:'absolute', inset:'0', width:'100%', height:'100%',
      objectFit:'cover', opacity:'0', zIndex:'1', filter:'grayscale(20%)'
    });
    item.insertBefore(nextImg, item.querySelector('.work-overlay'));
    let idx = 0, timer = null, busy = false;
    function advance() {
      if (busy) return; busy = true;
      idx = (idx + 1) % images.length;
      nextImg.src = images[idx];
      gsap.fromTo(nextImg, { opacity:0 }, { opacity:1, duration:0.9, ease:'power2.inOut',
        onComplete() { baseImg.src = images[idx]; gsap.set(nextImg, { opacity:0 }); busy = false; }
      });
    }
    function startCycle() { if (!timer) timer = setInterval(advance, 2000); }
    function stopCycle() {
      clearInterval(timer); timer = null; busy = false; idx = 0;
      baseImg.src = images[0]; gsap.set(nextImg, { opacity:0 });
    }
    item._gallery = { start: startCycle, stop: stopCycle };
    item.addEventListener('mouseenter', startCycle);
    item.addEventListener('mouseleave', stopCycle);
  });
</script>
</body>
