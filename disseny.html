<style>
  @font-face {
    font-family: 'Playfair Display';
    src: local('Georgia'), local('Times New Roman');
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --black: #2a2520;
    --off-white: #f0ebe3;
    --beige: #c8b89a;
    --gray: #aaa;
    --light-gray: #3a3530;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--off-white);
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top:0; left:0; right:0; z-index:100;
    display:flex; justify-content:space-between; align-items:center;
    padding: 1.5rem 3rem;
  }
  nav::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(to bottom, rgba(10,10,10,0.95), transparent);
    pointer-events:none;
  }
  .nav-logo {
    font-family:'Playfair Display', serif;
    font-size: 1.1rem; letter-spacing:.15em;
    text-transform:uppercase; color: var(--off-white);
    text-decoration:none; position:relative; z-index:1;
  }
  .nav-links { display:flex; gap:2.5rem; position:relative; z-index:1; }
  .nav-links a {
    color: var(--beige); text-decoration:none;
    font-size:.75rem; letter-spacing:.2em; text-transform:uppercase;
    transition: color .3s;
  }
  .nav-links a:hover { color: var(--off-white); }

  /* DROPDOWN */
  .nav-dropdown { position:relative; }
  .nav-dropdown-trigger { cursor:pointer; display:flex; align-items:center; gap:.4rem; }
  .nav-dropdown-trigger::after {
    content:''; width:5px; height:5px;
    border-right:1px solid var(--beige); border-bottom:1px solid var(--beige);
    transform:rotate(45deg) translateY(-2px);
    transition: transform .25s;
  }
  .nav-dropdown.open .nav-dropdown-trigger::after {
    transform:rotate(-135deg) translateY(-2px);
  }
  .nav-dropdown-menu {
    position:absolute; top:calc(100% + 1rem); left:50%;
    background:rgba(30,27,24,0.97);
    border:1px solid var(--light-gray);
    padding:.6rem 0;
    display:flex; flex-direction:column;
    min-width:130px;
    opacity:0; pointer-events:none;
    transform:translateX(-50%) translateY(-6px);
    transition:opacity .2s, transform .2s;
  }
  .nav-dropdown.open .nav-dropdown-menu {
    opacity:1; pointer-events:auto;
    transform:translateX(-50%) translateY(0);
  }
  .nav-dropdown-menu a {
    padding:.5rem 1.2rem;
    font-size:.7rem; letter-spacing:.2em; text-transform:uppercase;
    color:var(--beige); text-decoration:none;
    transition:color .2s, background .2s;
    white-space:nowrap;
  }
  .nav-dropdown-menu a:hover { color:var(--off-white); background:rgba(255,255,255,0.04); }

  /* HERO */
  #hero-design {
    height: 100vh; min-height: 600px;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 5rem 3rem;
    position: relative; overflow: hidden;
    background: var(--black);
    border-bottom: 1px solid var(--light-gray);
  }

  /* Particles */
  #hero-particles { position:absolute; inset:0; pointer-events:none; z-index:2; }

  /* Perspective grid plane */
  #persp-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 62%;
    perspective: 480px;
    perspective-origin: 50% 0%;
    overflow: hidden;
    z-index: 1;
    pointer-events: none;
  }
  #persp-grid {
    position: absolute;
    bottom: 0;
    left: -60%; right: -60%;
    height: 200%;
    transform: rotateX(76deg);
    transform-origin: 50% 100%;
    background-image:
      linear-gradient(rgba(200,184,154,0.22) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,184,154,0.16) 1px, transparent 1px);
    background-size: 90px 90px;
    animation: gridScroll 4s linear infinite;
  }
  @keyframes gridScroll {
    from { background-position: center 0; }
    to   { background-position: center 90px; }
  }
  /* Fade the horizon edge */
  #persp-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 55%;
    background: linear-gradient(to bottom, var(--black) 0%, transparent 100%);
    z-index: 2; pointer-events: none;
  }
  /* Vignette sides */
  #persp-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 100% at 50% 100%, transparent 45%, var(--black) 85%);
    z-index: 2; pointer-events: none;
  }

  /* Hero floating shapes */
  #hero-cube-wrap {
    position: absolute;
    left: 48%; top: 17%;
    z-index: 2; pointer-events: none;
  }
  #hero-ico-wrap {
    position: absolute;
    right: 12%; bottom: 14%;
    z-index: 2; pointer-events: none;
  }
  .h-cube-persp { width: 200px; height: 200px; perspective: 1000px; }
  .h-cube { width: 200px; height: 200px; position: relative; transform-style: preserve-3d; }
  .h-face {
    position: absolute; width: 200px; height: 200px;
    border: 1px solid rgba(200,184,154,0.4);
    background: rgba(42,37,32,0.07);
  }
  .h-face.front  { transform: translateZ(100px); }
  .h-face.back   { transform: rotateY(180deg) translateZ(100px); }
  .h-face.left   { transform: rotateY(-90deg) translateZ(100px); }
  .h-face.right  { transform: rotateY(90deg)  translateZ(100px); }
  .h-face.top    { transform: rotateX(90deg)  translateZ(100px); }
  .h-face.bottom { transform: rotateX(-90deg) translateZ(100px); }

  .hero-design-content { position: relative; z-index: 3; }

  .page-eyebrow {
    font-size:.7rem; letter-spacing:.4em; text-transform:uppercase;
    color: var(--beige); margin-bottom:1.5rem;
  }
  .page-title {
    font-family:'Playfair Display', serif;
    font-size: clamp(3.5rem, 8vw, 8rem);
    font-weight:900; line-height:.95;
    color: var(--off-white);
  }
  .page-title em { font-style:italic; color: var(--beige); }

  .hero-scroll {
    position: absolute; bottom: 2.5rem; right: 3rem; z-index: 3;
    display: flex; flex-direction: column; align-items: center; gap: .5rem;
    color: var(--gray); font-size: .65rem; letter-spacing: .3em; text-transform: uppercase;
  }
  .hero-scroll::after {
    content: ''; width: 1px; height: 50px; background: var(--beige);
    animation: scrollLine 2s ease-in-out infinite;
  }
  @keyframes scrollLine {
    0%,100% { transform: scaleY(1); opacity: 1; }
    50%     { transform: scaleY(.5); opacity: .4; }
  }

  /* SECTION BASE */
  section { padding: 7rem 3rem; }

  /* WORK */
  #work { background: var(--black); }
  .work-grid {
    display:grid; grid-template-columns: repeat(2, 1fr);
    gap: 40px; max-width: 880px; margin: 0 auto;
  }
  .work-item {
    position:relative; overflow:hidden; cursor:pointer;
    aspect-ratio: 1/1;
    background: var(--light-gray);
  }
  .work-item::after {
    content:'';
    position:absolute; inset:0;
    pointer-events:none;
    z-index:3;
    box-shadow:
      inset 0 0 0 3px rgba(255,255,255,0.6),
      inset 0 0 0 18px rgba(200,200,200,0.97),
      inset 0 0 0 22px rgba(240,240,240,0.85);
  }
  .work-item img {
    width:100%; height:100%; object-fit:cover;
    transition: transform .8s cubic-bezier(.25,.46,.45,.94), filter .8s;
    filter: grayscale(20%);
  }
  .work-item:hover img {
    transform: scale(1.05); filter: grayscale(0%);
  }
  .work-overlay {
    position:absolute; inset:0; z-index:2;
    background: linear-gradient(to top, rgba(10,10,10,.85) 0%, transparent 50%);
    opacity:0; transition: opacity .4s;
    display:flex; align-items:flex-end; padding:2rem;
  }
  .work-item:hover .work-overlay { opacity:1; }
  .work-overlay.touch-visible { opacity:1; }
  .work-info h3 {
    font-family:'Playfair Display', serif;
    font-size:1.4rem; color: var(--off-white);
  }
  .work-info span {
    font-size:.7rem; letter-spacing:.2em; text-transform:uppercase;
    color: var(--beige);
  }
  .work-num {
    position:absolute; top:1.5rem; left:1.5rem; z-index:4;
    font-size:.65rem; letter-spacing:.2em; color: var(--gray);
  }

  /* CTA */
  #cta { text-align:center; padding:7rem 3rem; border-top:1px solid var(--light-gray); }
  .cta-label { font-size:.7rem; letter-spacing:.4em; text-transform:uppercase; color:var(--beige); margin-bottom:1.5rem; display:block; }
  .cta-title { font-family:'Playfair Display',serif; font-size:clamp(3rem,7vw,7rem); font-weight:900; color:var(--off-white); line-height:1; margin-bottom:2.5rem; }
  .cta-btn { display:inline-block; padding:.9rem 2.5rem; border:1px solid var(--beige); color:var(--beige); text-decoration:none; font-size:.75rem; letter-spacing:.3em; text-transform:uppercase; transition:background .3s,color .3s; }
  .cta-btn:hover { background:var(--beige); color:var(--black); }

  /* FOOTER */
  footer {
    border-top:1px solid var(--light-gray);
    padding:2rem 3rem;
    display:flex; justify-content:space-between; align-items:center;
    color: var(--gray); font-size:.65rem; letter-spacing:.2em;
  }

  /* SCROLL REVEAL */
  .reveal { opacity:0; transform:translateY(30px); transition: opacity .8s ease, transform .8s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }

  /* Odd last item — center it in the 2-col grid */
  @media (min-width: 769px) {
    .work-item:last-child:nth-child(odd) {
      grid-column: 1 / -1;
      max-width: calc(50% - 20px);
      margin: 0 auto;
    }
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 1.2rem 1.5rem; }
    .nav-links { gap: 1.2rem; }
    .nav-links a { font-size: .65rem; }
    #hero-design { padding: 4rem 1.5rem 7rem; height: 70vh; min-height: 450px; }
    #persp-wrap { height: 55%; perspective: 300px; }
    #persp-grid { left: -80%; right: -80%; }
    #hero-cube-wrap { left: 5%; top: 8%; }
    #hero-ico-wrap  { right: 5%; bottom: 12%; left: auto; top: auto; }
    .h-cube-persp { width: 90px; height: 90px; perspective: 500px; }
    .h-cube       { width: 90px; height: 90px; }
    .h-face       { width: 90px; height: 90px; }
    .h-face.front  { transform: translateZ(45px); }
    .h-face.back   { transform: rotateY(180deg) translateZ(45px); }
    .h-face.left   { transform: rotateY(-90deg) translateZ(45px); }
    .h-face.right  { transform: rotateY(90deg)  translateZ(45px); }
    .h-face.top    { transform: rotateX(90deg)  translateZ(45px); }
    .h-face.bottom { transform: rotateX(-90deg) translateZ(45px); }
    #ico-canvas { width: 110px; height: 110px; }
    section { padding: 4rem 1.5rem; }
    .work-grid { grid-template-columns: 1fr; }
    #cta { padding: 4rem 1.5rem; }
    footer { padding: 1.5rem; flex-direction: column; gap: .6rem; text-align: center; }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  const heroEl   = document.getElementById('hero-design');
  const cubeWrap = document.getElementById('hero-cube-wrap');
  const icoWrap  = document.getElementById('hero-ico-wrap');
  const hCube    = document.querySelector('.h-cube');

  /* Cube spin */
  gsap.to(hCube, { rotationY: 360, duration: 40, ease: 'none', repeat: -1 });
  gsap.to(hCube, { rotationX: 14,  duration: 18, ease: 'sine.inOut', yoyo: true, repeat: -1 });

  /* Parallax on mousemove — cube moves less (far), icosahedron more (close) */
  if (!window.matchMedia('(hover: none)').matches) {
    const moveCX = gsap.quickTo(cubeWrap, 'x', { duration: 1.2, ease: 'power2.out' });
    const moveCY = gsap.quickTo(cubeWrap, 'y', { duration: 1.2, ease: 'power2.out' });
    const moveIX = gsap.quickTo(icoWrap,  'x', { duration: 0.9, ease: 'power2.out' });
    const moveIY = gsap.quickTo(icoWrap,  'y', { duration: 0.9, ease: 'power2.out' });
    heroEl.addEventListener('mousemove', e => {
      const r  = heroEl.getBoundingClientRect();
      const dx = (e.clientX - r.left - r.width  / 2) / (r.width  / 2);
      const dy = (e.clientY - r.top  - r.height / 2) / (r.height / 2);
      moveCX(dx * 16); moveCY(dy * 10);
      moveIX(dx * 30); moveIY(dy * 20);
    });
    heroEl.addEventListener('mouseleave', () => {
      moveCX(0); moveCY(0); moveIX(0); moveIY(0);
    });
  }

  /* Icosahedron — canvas wireframe renderer */
  (function () {
    const canvas = document.getElementById('ico-canvas');
    const ctx    = canvas.getContext('2d');
    const S      = canvas.width;
    const C      = S / 2;
    const phi    = (1 + Math.sqrt(5)) / 2;

    const verts = [
      [0,1,phi],[0,-1,phi],[0,1,-phi],[0,-1,-phi],
      [1,phi,0],[-1,phi,0],[1,-phi,0],[-1,-phi,0],
      [phi,0,1],[phi,0,-1],[-phi,0,1],[-phi,0,-1]
    ];
    const edges = [
      [0,1],[0,4],[0,5],[0,8],[0,10],
      [1,6],[1,7],[1,8],[1,10],
      [2,3],[2,4],[2,5],[2,9],[2,11],
      [3,6],[3,7],[3,9],[3,11],
      [4,5],[4,8],[4,9],
      [5,10],[5,11],
      [6,7],[6,8],[6,9],
      [7,10],[7,11],
      [8,9],[10,11]
    ];

    const cR    = Math.sqrt(1 + phi * phi);
    const scale = (C * 0.82) / cR;
    let rotY = 0, rotX = 0.35;

    function ry(v, a) {
      const c = Math.cos(a), s = Math.sin(a);
      return [c*v[0]+s*v[2], v[1], -s*v[0]+c*v[2]];
    }
    function rx(v, a) {
      const c = Math.cos(a), s = Math.sin(a);
      return [v[0], c*v[1]-s*v[2], s*v[1]+c*v[2]];
    }
    function proj(v) {
      const fov = 4.5, z = v[2]/cR + fov;
      return [C + v[0]*scale*fov/z, C + v[1]*scale*fov/z];
    }

    (function draw() {
      ctx.clearRect(0, 0, S, S);
      const t = verts.map(v => rx(ry(v, rotY), rotX));
      const p = t.map(proj);
      edges.forEach(([a, b]) => {
        const z     = (t[a][2] + t[b][2]) / 2 / cR;
        const alpha = 0.18 + (z + 1) * 0.18;
        ctx.beginPath();
        ctx.moveTo(p[a][0], p[a][1]);
        ctx.lineTo(p[b][0], p[b][1]);
        ctx.strokeStyle = `rgba(200,184,154,${alpha.toFixed(2)})`;
        ctx.lineWidth   = 0.85;
        ctx.stroke();
      });
      rotY += 0.0013;
      rotX += 0.0005;
      requestAnimationFrame(draw);
    })();
  })();

  /* Particles */
  const pCanvas = document.getElementById('hero-particles');
  const pCtx    = pCanvas.getContext('2d');
  const parts   = [];

  function resizeCanvas() {
    pCanvas.width  = heroEl.offsetWidth;
    pCanvas.height = heroEl.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function spawnP() {
    parts.push({
      x:  Math.random() * pCanvas.width,
      y:  pCanvas.height + 4,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -(Math.random() * 0.28 + 0.08),
      a:  Math.random() * 0.18 + 0.04,
      r:  Math.random() * 1.3 + 0.3
    });
  }
  setInterval(() => { if (Math.random() < 0.45) spawnP(); }, 100);

  (function animP() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    for (let i = parts.length - 1; i >= 0; i--) {
      const p = parts[i];
      p.x += p.vx; p.y += p.vy;
      if (p.y < -10) { parts.splice(i, 1); continue; }
      pCtx.save();
      pCtx.globalAlpha = p.a;
      pCtx.fillStyle = '#c8b89a';
      pCtx.beginPath(); pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2); pCtx.fill();
      pCtx.restore();
    }
    requestAnimationFrame(animP);
  })();

  /* Scroll reveal */
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); } });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  /* Dropdown nav */
  const dropdown = document.querySelector('.nav-dropdown');
  const trigger = dropdown.querySelector('.nav-dropdown-trigger');
  trigger.addEventListener('click', e => {
    e.preventDefault();
    dropdown.classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!dropdown.contains(e.target)) dropdown.classList.remove('open');
  });
  dropdown.querySelectorAll('.nav-dropdown-menu a').forEach(a => {
    a.addEventListener('click', () => dropdown.classList.remove('open'));
  });

  /* Touch — auto-cycle on viewport entry */
  if (window.matchMedia('(hover: none)').matches) {
    const touchObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        const item = e.target;
        const overlay = item.querySelector('.work-overlay');
        if (e.isIntersecting) {
          if (overlay) overlay.classList.add('touch-visible');
          if (item._gallery) item._gallery.start();
        } else {
          if (overlay) overlay.classList.remove('touch-visible');
          if (item._gallery) item._gallery.stop();
        }
      });
    }, { threshold: 0.5 });
    document.querySelectorAll('.work-item').forEach(item => touchObs.observe(item));
  }

  /* Preload gallery images */
  document.querySelectorAll('.work-item[data-images]').forEach(item => {
    JSON.parse(item.getAttribute('data-images')).forEach(url => { new Image().src = url; });
  });

  /* Gallery cycling on hover */
  document.querySelectorAll('.work-item[data-images]').forEach(item => {
    const images = JSON.parse(item.getAttribute('data-images'));
    if (images.length < 2) return;
    const baseImg = item.querySelector('img');
    const nextImg = document.createElement('img');
    Object.assign(nextImg.style, {
      position:'absolute', inset:'0', width:'100%', height:'100%',
      objectFit:'cover', opacity:'0', zIndex:'1', filter:'grayscale(20%)'
    });
    item.insertBefore(nextImg, item.querySelector('.work-overlay'));
    let idx = 0, timer = null, busy = false;
    function advance() {
      if (busy) return; busy = true;
      idx = (idx + 1) % images.length;
      nextImg.src = images[idx];
      gsap.fromTo(nextImg, { opacity:0 }, { opacity:1, duration:0.9, ease:'power2.inOut',
        onComplete() { baseImg.src = images[idx]; gsap.set(nextImg, { opacity:0 }); busy = false; }
      });
    }
    function startCycle() { if (!timer) timer = setInterval(advance, 2000); }
    function stopCycle() {
      clearInterval(timer); timer = null; busy = false; idx = 0;
      baseImg.src = images[0]; gsap.set(nextImg, { opacity:0 });
    }
    item._gallery = { start: startCycle, stop: stopCycle };
    item.addEventListener('mouseenter', startCycle);
    item.addEventListener('mouseleave', stopCycle);
  });
</script>
</body>
</html>
