<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ibai Jaimez — Obres d'Art</title>
<style>
  @font-face { font-family:'Playfair Display'; src:local('Georgia'),local('Times New Roman'); }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --black: #2a2520;
    --off-white: #f0ebe3;
    --beige: #c8b89a;
    --gray: #aaa;
    --light-gray: #3a3530;
  }
  html { scroll-behavior:smooth; }
  body { background:var(--black); color:var(--off-white); font-family:'Helvetica Neue','Arial',sans-serif; font-weight:300; overflow-x:hidden; }

  /* ── NAV ── */
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:1.5rem 3rem; }
  nav::before { content:''; position:absolute; inset:0; background:linear-gradient(to bottom,rgba(10,10,10,0.95),transparent); pointer-events:none; }
  .nav-logo { font-family:'Playfair Display',serif; font-size:1.1rem; letter-spacing:.15em; text-transform:uppercase; color:var(--off-white); text-decoration:none; position:relative; z-index:1; }
  .nav-links { display:flex; gap:2.5rem; position:relative; z-index:1; }
  .nav-links a { color:var(--beige); text-decoration:none; font-size:.75rem; letter-spacing:.2em; text-transform:uppercase; transition:color .3s; }
  .nav-links a:hover { color:var(--off-white); }
  .nav-dropdown { position:relative; }
  .nav-dropdown-trigger { cursor:pointer; display:flex; align-items:center; gap:.4rem; }
  .nav-dropdown-trigger::after { content:''; width:5px; height:5px; border-right:1px solid var(--beige); border-bottom:1px solid var(--beige); transform:rotate(45deg) translateY(-2px); transition:transform .25s; }
  .nav-dropdown.open .nav-dropdown-trigger::after { transform:rotate(-135deg) translateY(-2px); }
  .nav-dropdown-menu { position:absolute; top:calc(100% + 1rem); left:50%; background:rgba(30,27,24,0.97); border:1px solid var(--light-gray); padding:.6rem 0; display:flex; flex-direction:column; min-width:130px; opacity:0; pointer-events:none; transform:translateX(-50%) translateY(-6px); transition:opacity .2s,transform .2s; }
  .nav-dropdown.open .nav-dropdown-menu { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
  .nav-dropdown-menu a { padding:.5rem 1.2rem; font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; color:var(--beige); text-decoration:none; transition:color .2s,background .2s; white-space:nowrap; }
  .nav-dropdown-menu a:hover { color:var(--off-white); background:rgba(255,255,255,0.04); }

  /* ── HERO ── */
  #hero-art {
    height: 100vh; min-height: 600px;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 5rem 3rem;
    position: relative; overflow: hidden;
    background: var(--black);
  }
  /* Concrete grid texture */
  #hero-art::before {
    content:''; position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(ellipse at 15% 85%, rgba(58,53,48,0.7) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 15%, rgba(42,37,32,0.5) 0%, transparent 45%),
      repeating-linear-gradient(0deg, transparent, transparent 70px, rgba(200,184,154,0.025) 70px, rgba(200,184,154,0.025) 71px),
      repeating-linear-gradient(90deg, transparent, transparent 70px, rgba(200,184,154,0.025) 70px, rgba(200,184,154,0.025) 71px);
  }
  /* Floor line */
  #hero-art::after {
    content:''; position:absolute; bottom:18%; left:0; right:0; z-index:0;
    height:1px; background:linear-gradient(to right, transparent, rgba(200,184,154,0.12), transparent);
  }

  /* Canvas particles */
  #particles { position:absolute; inset:0; pointer-events:none; z-index:1; }

  /* Skateboard parallax wrapper */
  #skate-wrap {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  /* Intro video */
  #intro-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: 90% center;
    pointer-events: none;
  }

  /* Hero content — hidden until video ends */
  .hero-art-content { position:relative; z-index:3; }
  .page-eyebrow { font-size:.7rem; letter-spacing:.45em; text-transform:uppercase; color:var(--beige); margin-bottom:1.8rem; display:block; }
  .page-title {
    font-family:'Playfair Display',serif;
    font-size:clamp(3.5rem, 9vw, 9rem);
    font-weight:900; line-height:.9;
    color:var(--off-white);
    perspective:1000px;
  }
  .page-title em { font-style:italic; color:var(--beige); }
  .char { display:inline-block; }

  /* Scroll hint */
  .hero-scroll {
    position:absolute; bottom:2.5rem; right:3rem; z-index:3;
    display:flex; flex-direction:column; align-items:center; gap:.5rem;
    color:var(--gray); font-size:.65rem; letter-spacing:.3em; text-transform:uppercase;
  }
  .hero-scroll::after { content:''; width:1px; height:50px; background:var(--beige); animation:scrollLine 2s ease-in-out infinite; }
  @keyframes scrollLine { 0%,100%{transform:scaleY(1);opacity:1} 50%{transform:scaleY(.5);opacity:.4} }

  /* ── WORK ── */
  section { padding:7rem 3rem; }
  #work { background:var(--black); }
  .work-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:40px; }
  .work-item { position:relative; overflow:hidden; cursor:pointer; aspect-ratio:1/1; background:var(--light-gray); }
  .work-item::after { content:''; position:absolute; inset:0; pointer-events:none; z-index:3; box-shadow:inset 0 0 0 3px rgba(255,255,255,0.6),inset 0 0 0 18px rgba(200,200,200,0.97),inset 0 0 0 22px rgba(240,240,240,0.85); }
  .work-item img { width:100%; height:100%; object-fit:cover; transition:transform .8s cubic-bezier(.25,.46,.45,.94),filter .8s; filter:grayscale(20%); }
  .work-item:hover img { transform:scale(1.05); filter:grayscale(0%); }
  .work-overlay { position:absolute; inset:0; z-index:2; background:linear-gradient(to top,rgba(10,10,10,.85) 0%,transparent 50%); opacity:0; transition:opacity .4s; display:flex; align-items:flex-end; padding:2rem; }
  .work-item:hover .work-overlay { opacity:1; }
  .work-info h3 { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--off-white); }
  .work-info span { font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; color:var(--beige); }
  .work-num { position:absolute; top:1.5rem; left:1.5rem; z-index:4; font-size:.65rem; letter-spacing:.2em; color:var(--gray); }

  /* Hover image swap */
  .img-hover { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .4s; filter:grayscale(20%); }
  .work-item:hover .img-hover { opacity:1; filter:grayscale(0%); }
  .img-default { transition:opacity .4s, transform .8s cubic-bezier(.25,.46,.45,.94), filter .8s; }
  .work-item:hover .img-default { opacity:0; }

  /* ── FOOTER ── */
  footer { border-top:1px solid var(--light-gray); padding:2rem 3rem; display:flex; justify-content:space-between; align-items:center; color:var(--gray); font-size:.65rem; letter-spacing:.2em; }

  /* ── REVEAL ── */
  .reveal { opacity:0; transform:translateY(30px); transition:opacity .8s ease,transform .8s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width:768px) {
    nav { padding:1.2rem 1.5rem; }
    .nav-links { gap:1.2rem; }
    .nav-links a { font-size:.65rem; }
    #hero-art { padding:4rem 1.5rem 3rem; }
    .page-title { font-size:clamp(2.8rem,12vw,5rem); }
    section { padding:4rem 1.5rem; }
    .work-grid { grid-template-columns:1fr; }
    footer { padding:1.5rem; flex-direction:column; gap:.6rem; text-align:center; }
    #skate-wrap { inset: unset; top: 1.75rem; bottom: 5rem; left: 0; right: 0; overflow: hidden; }
    #intro-video { object-fit: contain; object-position: center 30%; transform: scale(1.45); }
  }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
/* ════════════════════════════════
   CANVAS — ambient dust particles
════════════════════════════════ */
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
const dust   = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function spawnDust() {
  dust.push({
    x: Math.random() * canvas.width,
    y: canvas.height + 4,
    vx: (Math.random() - 0.5) * 0.5,
    vy: -(Math.random() * 0.35 + 0.1),
    a:  Math.random() * 0.18 + 0.04,
    r:  Math.random() * 1.5 + 0.4
  });
}
setInterval(() => { if (Math.random() < 0.5) spawnDust(); }, 100);

(function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = dust.length - 1; i >= 0; i--) {
    const p = dust[i];
    p.x += p.vx; p.y += p.vy;
    if (p.y < -10) { dust.splice(i, 1); continue; }
    ctx.save(); ctx.globalAlpha = p.a; ctx.fillStyle = '#c8b89a';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  requestAnimationFrame(loop);
})();

// Split title into individual .char spans
(function splitTitle() {
  const title = document.querySelector('.page-title');
  const nodes = [...title.childNodes];
  title.innerHTML = '';
  nodes.forEach(node => {
    if (node.nodeType === 3) {
      [...node.textContent].forEach(ch => {
        const s = document.createElement('span');
        s.className = 'char';
        s.textContent = ch;
        title.appendChild(s);
      });
    } else if (node.nodeName === 'BR') {
      title.appendChild(document.createElement('br'));
    } else if (node.nodeName === 'EM') {
      [...node.textContent].forEach(ch => {
        const s = document.createElement('span');
        s.className = 'char';
        s.style.cssText = 'font-style:italic;color:var(--beige)';
        s.textContent = ch;
        title.appendChild(s);
      });
    }
  });
})();

// Set initial states
gsap.set('.page-eyebrow', { opacity:0, y:20 });
gsap.set('.char',         { opacity:0, y:60, rotateX:-80, transformOrigin:'50% 100%' });
gsap.set('.hero-scroll',  { opacity:0 });

// Text animates simultaneously with video on page load
const tl = gsap.timeline({ delay:0.3 });

tl.to('.page-eyebrow', { opacity:1, y:0, duration:0.55, ease:'power2.out' })
  .to('.char', {
    opacity:1, y:0, rotateX:0,
    stagger: 0.05,
    duration: 0.55,
    ease: 'back.out(1.5)'
  }, '-=0.25')
  .to('.hero-scroll', { opacity:1, duration:0.4 }, '-=0.1');

// Wrap video in a parallax container so floating and parallax don't conflict
const video = document.getElementById('intro-video');
const hero  = document.getElementById('hero-art');
const skateWrap = document.createElement('div');
skateWrap.id = 'skate-wrap';
video.style.zIndex = 'auto';
video.parentNode.insertBefore(skateWrap, video);
skateWrap.appendChild(video);

// Mouse parallax on wrapper
const moveX = gsap.quickTo(skateWrap, 'x', { duration:0.9, ease:'power2.out' });
const moveY = gsap.quickTo(skateWrap, 'y', { duration:0.9, ease:'power2.out' });
hero.addEventListener('mousemove', e => {
  const r  = hero.getBoundingClientRect();
  const dx = (e.clientX - r.left - r.width  / 2) / (r.width  / 2);
  const dy = (e.clientY - r.top  - r.height / 2) / (r.height / 2);
  moveX(dx * 28);
  moveY(dy * 16);
});
hero.addEventListener('mouseleave', () => { moveX(0); moveY(0); });

// Floating on the video element itself (no conflict with parallax)
video.addEventListener('ended', () => {
  video.pause();
  gsap.to(video, { y:-14, rotation:1.5, duration:2.2, ease:'sine.inOut', yoyo:true, repeat:-1 });
});

/* ════════════════════════════════
   Scroll reveal
════════════════════════════════ */
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

/* ════════════════════════════════
   Dropdown nav
════════════════════════════════ */
const dd = document.querySelector('.nav-dropdown');
dd.querySelector('.nav-dropdown-trigger').addEventListener('click', e => {
  e.preventDefault(); dd.classList.toggle('open');
});
document.addEventListener('click', e => { if (!dd.contains(e.target)) dd.classList.remove('open'); });
dd.querySelectorAll('.nav-dropdown-menu a').forEach(a => a.addEventListener('click', () => dd.classList.remove('open')));
</script>
