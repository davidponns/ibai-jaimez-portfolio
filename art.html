<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ibai Jaimez — Obres d'Art</title>
<style>
  @font-face { font-family:'Playfair Display'; src:local('Georgia'),local('Times New Roman'); }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --black: #2a2520;
    --off-white: #f0ebe3;
    --beige: #c8b89a;
    --gray: #aaa;
    --light-gray: #3a3530;
  }
  html { scroll-behavior:smooth; }
  body { background:var(--black); color:var(--off-white); font-family:'Helvetica Neue','Arial',sans-serif; font-weight:300; overflow-x:hidden; }

  /* ── NAV ── */
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:1.5rem 3rem; }
  nav::before { content:''; position:absolute; inset:0; background:linear-gradient(to bottom,rgba(10,10,10,0.95),transparent); pointer-events:none; }
  .nav-logo { font-family:'Playfair Display',serif; font-size:1.1rem; letter-spacing:.15em; text-transform:uppercase; color:var(--off-white); text-decoration:none; position:relative; z-index:1; }
  .nav-links { display:flex; gap:2.5rem; position:relative; z-index:1; }
  .nav-links a { color:var(--beige); text-decoration:none; font-size:.75rem; letter-spacing:.2em; text-transform:uppercase; transition:color .3s; }
  .nav-links a:hover { color:var(--off-white); }
  .nav-dropdown { position:relative; }
  .nav-dropdown-trigger { cursor:pointer; display:flex; align-items:center; gap:.4rem; }
  .nav-dropdown-trigger::after { content:''; width:5px; height:5px; border-right:1px solid var(--beige); border-bottom:1px solid var(--beige); transform:rotate(45deg) translateY(-2px); transition:transform .25s; }
  .nav-dropdown.open .nav-dropdown-trigger::after { transform:rotate(-135deg) translateY(-2px); }
  .nav-dropdown-menu { position:absolute; top:calc(100% + 1rem); left:50%; background:rgba(30,27,24,0.97); border:1px solid var(--light-gray); padding:.6rem 0; display:flex; flex-direction:column; min-width:130px; opacity:0; pointer-events:none; transform:translateX(-50%) translateY(-6px); transition:opacity .2s,transform .2s; }
  .nav-dropdown.open .nav-dropdown-menu { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
  .nav-dropdown-menu a { padding:.5rem 1.2rem; font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; color:var(--beige); text-decoration:none; transition:color .2s,background .2s; white-space:nowrap; }
  .nav-dropdown-menu a:hover { color:var(--off-white); background:rgba(255,255,255,0.04); }

  /* ── HERO ── */
  #hero-art {
    height: 100vh; min-height: 600px;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 5rem 3rem;
    position: relative; overflow: hidden;
    background: var(--black);
  }
  /* Concrete grid texture */
  #hero-art::before {
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 15% 85%, rgba(58,53,48,0.7) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 15%, rgba(42,37,32,0.5) 0%, transparent 45%),
      repeating-linear-gradient(0deg, transparent, transparent 70px, rgba(200,184,154,0.025) 70px, rgba(200,184,154,0.025) 71px),
      repeating-linear-gradient(90deg, transparent, transparent 70px, rgba(200,184,154,0.025) 70px, rgba(200,184,154,0.025) 71px);
  }
  /* Floor line */
  #hero-art::after {
    content:''; position:absolute; bottom:20%; left:0; right:0;
    height:1px; background:linear-gradient(to right, transparent, rgba(200,184,154,0.15), transparent);
  }

  #particles { position:absolute; inset:0; pointer-events:none; z-index:1; }

  /* Skateboard */
  .skate-wrap {
    position: absolute;
    bottom: 18%;
    left: 0;
    z-index: 3;
    width: clamp(200px, 22vw, 300px);
  }
  .skateboard { width:100%; height:auto; filter:drop-shadow(0 12px 30px rgba(0,0,0,0.7)); }
  .wheel-spin {
    transform-box: fill-box;
    transform-origin: center;
    animation: wSpin 0.32s linear infinite paused;
  }
  @keyframes wSpin { to { transform:rotate(360deg); } }

  /* Content */
  .hero-art-content { position:relative; z-index:2; }
  .page-eyebrow {
    font-size:.7rem; letter-spacing:.45em; text-transform:uppercase;
    color:var(--beige); margin-bottom:1.8rem; display:block;
  }
  .page-title {
    font-family:'Playfair Display',serif;
    font-size:clamp(3.5rem, 9vw, 9rem);
    font-weight:900; line-height:.9;
    color:var(--off-white);
    perspective:1000px;
  }
  .page-title em { font-style:italic; color:var(--beige); }
  .char { display:inline-block; }

  /* Scroll hint */
  .hero-scroll {
    position:absolute; bottom:2.5rem; right:3rem; z-index:2;
    display:flex; flex-direction:column; align-items:center; gap:.5rem;
    color:var(--gray); font-size:.65rem; letter-spacing:.3em; text-transform:uppercase;
  }
  .hero-scroll::after { content:''; width:1px; height:50px; background:var(--beige); animation:scrollLine 2s ease-in-out infinite; }
  @keyframes scrollLine { 0%,100%{transform:scaleY(1);opacity:1} 50%{transform:scaleY(.5);opacity:.4} }

  /* ── WORK ── */
  section { padding:7rem 3rem; }
  #work { background:var(--black); }
  .work-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:40px; }
  .work-item { position:relative; overflow:hidden; cursor:pointer; aspect-ratio:1/1; background:var(--light-gray); }
  .work-item::after { content:''; position:absolute; inset:0; pointer-events:none; z-index:3; box-shadow:inset 0 0 0 3px rgba(255,255,255,0.6),inset 0 0 0 18px rgba(200,200,200,0.97),inset 0 0 0 22px rgba(240,240,240,0.85); }
  .work-item img { width:100%; height:100%; object-fit:cover; transition:transform .8s cubic-bezier(.25,.46,.45,.94),filter .8s; filter:grayscale(20%); }
  .work-item:hover img { transform:scale(1.05); filter:grayscale(0%); }
  .work-overlay { position:absolute; inset:0; z-index:2; background:linear-gradient(to top,rgba(10,10,10,.85) 0%,transparent 50%); opacity:0; transition:opacity .4s; display:flex; align-items:flex-end; padding:2rem; }
  .work-item:hover .work-overlay { opacity:1; }
  .work-info h3 { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--off-white); }
  .work-info span { font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; color:var(--beige); }
  .work-num { position:absolute; top:1.5rem; left:1.5rem; z-index:4; font-size:.65rem; letter-spacing:.2em; color:var(--gray); }

  /* ── FOOTER ── */
  footer { border-top:1px solid var(--light-gray); padding:2rem 3rem; display:flex; justify-content:space-between; align-items:center; color:var(--gray); font-size:.65rem; letter-spacing:.2em; }

  /* ── REVEAL ── */
  .reveal { opacity:0; transform:translateY(30px); transition:opacity .8s ease,transform .8s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width:768px) {
    nav { padding:1.2rem 1.5rem; }
    .nav-links { gap:1.2rem; }
    .nav-links a { font-size:.65rem; }
    #hero-art { padding:4rem 1.5rem 3rem; }
    .page-title { font-size:clamp(2.8rem,12vw,5rem); }
    .skate-wrap { width:160px; bottom:16%; }
    section { padding:4rem 1.5rem; }
    .work-grid { grid-template-columns:1fr; }
    footer { padding:1.5rem; flex-direction:column; gap:.6rem; text-align:center; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">Ibai Jaimez</a>
  <div class="nav-links">
    <div class="nav-dropdown">
      <a class="nav-dropdown-trigger" href="#">Obres</a>
      <div class="nav-dropdown-menu">
        <a href="art.html">Art</a>
        <a href="disseny.html">Disseny</a>
        <a href="publicitat.html">Publicitat</a>
      </div>
    </div>
    <a href="index.html#about">Sobre</a>
    <a href="index.html#contact">Contacte</a>
  </div>
</nav>

<!-- HERO -->
<section id="hero-art">
  <canvas id="particles"></canvas>

  <!-- SKATEBOARD SVG (side view, popsicle shape) -->
  <div class="skate-wrap">
    <svg class="skateboard" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Deck shadow -->
      <ellipse cx="150" cy="72" rx="120" ry="4" fill="rgba(0,0,0,0.4)"/>
      <!-- Deck body - popsicle shape -->
      <path d="M22 30 C22 24 30 20 44 20 L256 20 C270 20 278 24 278 30 L278 42 C278 48 270 52 256 52 L44 52 C30 52 22 48 22 42 Z" fill="#e8ddd0"/>
      <!-- Grip tape -->
      <path d="M22 30 C22 24 30 20 44 20 L256 20 C270 20 278 24 278 30 L278 42 C278 48 270 52 256 52 L44 52 C30 52 22 48 22 42 Z" fill="rgba(20,15,10,0.35)"/>
      <!-- Deck graphic: circle with cross (art-inspired) -->
      <circle cx="150" cy="36" r="13" fill="none" stroke="rgba(200,184,154,0.55)" stroke-width="1.2"/>
      <line x1="134" y1="36" x2="166" y2="36" stroke="rgba(200,184,154,0.4)" stroke-width="1"/>
      <line x1="150" y1="23" x2="150" y2="49" stroke="rgba(200,184,154,0.4)" stroke-width="1"/>
      <circle cx="150" cy="36" r="4" fill="rgba(200,184,154,0.3)"/>
      <!-- Nose + tail detail -->
      <path d="M22 36 L14 34 L14 38 Z" fill="#c8b89a" opacity="0.6"/>
      <path d="M278 36 L286 34 L286 38 Z" fill="#c8b89a" opacity="0.6"/>
      <!-- Trucks (baseplate) -->
      <rect x="38" y="50" width="44" height="8" rx="3" fill="#7a6a5a"/>

      <line x1="240" y1="54" x2="240" y2="54" stroke="#c8b89a" stroke-width="2"/>
      <!-- FRONT WHEEL -->
      <g class="wheel-spin">
        <circle cx="60" cy="65" r="13" fill="#1c1814" stroke="#7a6a5a" stroke-width="2"/>
        <circle cx="60" cy="65" r="8" fill="#252018"/>
        <line x1="60" y1="58" x2="60" y2="72" stroke="#4a4035" stroke-width="2.5" stroke-linecap="round"/>

        <line x1="55" y1="60" x2="65" y2="70" stroke="#3a3028" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="65" y1="60" x2="55" y2="70" stroke="#3a3028" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <circle cx="60" cy="65" r="3.5" fill="#c8b89a"/>
      <!-- BACK WHEEL -->
      <g class="wheel-spin">
        <circle cx="240" cy="65" r="13" fill="#1c1814" stroke="#7a6a5a" stroke-width="2"/>
        <circle cx="240" cy="65" r="8" fill="#252018"/>
        <line x1="240" y1="58" x2="240" y2="72" stroke="#4a4035" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="233" y1="65" x2="247" y2="65" stroke="#4a4035" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="235" y1="60" x2="245" y2="70" stroke="#3a3028" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="245" y1="60" x2="235" y2="70" stroke="#3a3028" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <circle cx="240" cy="65" r="3.5" fill="#c8b89a"/>
    </svg>
  </div>

  <div class="hero-art-content">
    <p class="page-eyebrow">Obra seleccionada &nbsp;·&nbsp; Art</p>
    <h1 class="page-title">Obres<br>d'<em>Art</em></h1>

  <div class="hero-scroll">Scroll</div>
</section>

<!-- WORK -->
<section id="work">
  <div class="work-grid">
    <div class="work-item reveal"><span class="work-num">01</span></div>
    <div class="work-item reveal"><span class="work-num">02</span></div>
    <div class="work-item reveal"><span class="work-num">03</span></div>
    <div class="work-item reveal"><span class="work-num">04</span></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <span>© 2025 Ibai Jaimez</span>
  <span>Art · Disseny · Construcció</span>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
/* ════════════════════════════════
   CANVAS — particles
════════════════════════════════ */
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
const burst  = [];
const dust   = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function spawnBurst(x, y) {
  const colors = ['#f0ebe3','#c8b89a','#ffffff','#d4c8b0','#aaa'];
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 9 + 2;
    burst.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 4,
      a:  1,
      r:  Math.random() * 5 + 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      square: Math.random() > 0.6
    });
  }
}

function spawnDust() {
  dust.push({
    x: Math.random() * canvas.width,
    y: canvas.height + 4,
    vx: (Math.random() - 0.5) * 0.5,
    vy: -(Math.random() * 0.35 + 0.1),
    a:  Math.random() * 0.2 + 0.04,
    r:  Math.random() * 1.5 + 0.4
  });
}
setInterval(() => { if (Math.random() < 0.5) spawnDust(); }, 100);

(function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = burst.length - 1; i >= 0; i--) {
    const p = burst[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.a -= 0.022;
    if (p.a <= 0) { burst.splice(i, 1); continue; }
    ctx.save(); ctx.globalAlpha = p.a; ctx.fillStyle = p.color;
    if (p.square) { ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r); }
    else { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); }
    ctx.restore();
  }

  for (let i = dust.length - 1; i >= 0; i--) {
    const p = dust[i];
    p.x += p.vx; p.y += p.vy;
    if (p.y < -10) { dust.splice(i, 1); continue; }
    ctx.save(); ctx.globalAlpha = p.a; ctx.fillStyle = '#c8b89a';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  requestAnimationFrame(loop);
})();

/* ════════════════════════════════
   GSAP — intro sequence
════════════════════════════════ */

// Split title into individual .char spans preserving <br> and <em>
(function splitTitle() {
  const title = document.querySelector('.page-title');
  const nodes = [...title.childNodes];
  title.innerHTML = '';
  nodes.forEach(node => {
    if (node.nodeType === 3) { // text node
      [...node.textContent].forEach(ch => {
        const s = document.createElement('span');
        s.className = 'char';
        s.textContent = ch === ' ' ? ' ' : ch;
        title.appendChild(s);
      });
    } else if (node.nodeName === 'BR') {
      title.appendChild(document.createElement('br'));
    } else if (node.nodeName === 'EM') {
      [...node.textContent].forEach(ch => {
        const s = document.createElement('span');
        s.className = 'char';
        s.style.cssText = 'font-style:italic;color:var(--beige)';
        s.textContent = ch;
        title.appendChild(s);
      });
    }
  });
})();

// Hide everything before animation
gsap.set('.page-eyebrow', { opacity:0, y:18 });
gsap.set('.char',         { opacity:0, y:55, rotateX:-75, transformOrigin:'50% 100%' });
gsap.set('.hero-scroll',  { opacity:0 });
gsap.set('.skate-wrap',   { x: '-110vw' });

const wheels = document.querySelectorAll('.wheel-spin');
function startWheels() { wheels.forEach(w => w.style.animationPlayState = 'running'); }
function stopWheels()  { wheels.forEach(w => w.style.animationPlayState = 'paused');  }

const tl = gsap.timeline({ delay:0.3 });

// 1 — Board rolls in
tl.to('.skate-wrap', {
    x: '10vw',
    duration: 1.0,
    ease: 'power2.out',
    onStart: startWheels
  })

// 2 — Brief pause, then kickflip (rotateX 360 = flip along length axis)
  .to('.skate-wrap', {
    rotateX: 360,
    transformPerspective: 700,
    duration: 0.42,
    ease: 'none',
    onStart() {
      stopWheels();
      const r = document.querySelector('.skate-wrap').getBoundingClientRect();
      spawnBurst(r.left + r.width / 2, r.top + r.height / 2);
    },
    onComplete: startWheels
  })

// 3 — Board exits right
  .to('.skate-wrap', {
    x: '115vw',
    duration: 0.85,
    ease: 'power2.in',
    onComplete: stopWheels
  })

// 4 — Eyebrow text
  .to('.page-eyebrow', { opacity:1, y:0, duration:0.5, ease:'power2.out' }, '-=0.55')

// 5 — Title: each letter flips in
  .to('.char', {
    opacity: 1, y: 0, rotateX: 0,
    stagger: 0.048,
    duration: 0.55,
    ease: 'back.out(1.5)'
  }, '-=0.35')

// 6 — Scroll indicator
  .to('.hero-scroll', { opacity:1, duration:0.4 }, '-=0.1');


/* ════════════════════════════════
   Scroll reveal
════════════════════════════════ */
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

/* ════════════════════════════════
   Dropdown nav
════════════════════════════════ */
const dd = document.querySelector('.nav-dropdown');
dd.querySelector('.nav-dropdown-trigger').addEventListener('click', e => {
  e.preventDefault(); dd.classList.toggle('open');
});
document.addEventListener('click', e => { if (!dd.contains(e.target)) dd.classList.remove('open'); });
dd.querySelectorAll('.nav-dropdown-menu a').forEach(a => a.addEventListener('click', () => dd.classList.remove('open')));
</script>
</body>
</html>
